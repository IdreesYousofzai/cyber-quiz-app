<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cyber Security Quiz{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-wrapper">
        <header class="site-header">
            <div class="logo">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">CyberQuiz</span>
            </div>
        </header>

        <main class="content">
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Cyber Security Quiz App &mdash; built with Flask</p>
        </footer>
    </div>
</body>
</html>
